[build]
  command = "vite build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"

# Lighthouse and Chromium load these at runtime rather than through static
# imports, so include them in the official Netlify function package.
[functions]
  included_files = [
    "node_modules/@sparticuz/chromium/bin/**",
    "node_modules/lighthouse/flow-report/assets/**",
    "node_modules/lighthouse/report/assets/**",
    "node_modules/lighthouse/dist/report/**",
    "node_modules/lighthouse/shared/localization/locales/**",
  ]

